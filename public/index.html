<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Giám Sát ESP32 (Cloud Render)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; color: #333; }
        .main-wrapper { max-width: 950px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .control-panel { display: flex; justify-content: center; align-items: center; margin-bottom: 25px; gap: 10px; }
        select { padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; background-color: #f8f9fa; cursor: pointer; outline: none; }
        .chart-container { position: relative; width: 100%; height: 450px; }
        .ota-box { margin-top: 40px; padding: 20px; background: #f8fcfb; border: 2px dashed #b2bec3; border-radius: 8px; text-align: center; }
        .ota-box h3 { margin-top: 0; color: #00b894; }
        input[type="file"] { margin: 15px 0; }
        button { background-color: #0984e3; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        button:hover { background-color: #74b9ff; }
        button:disabled { background-color: #b2bec3; cursor: not-allowed; }
        #statusText { margin-top: 15px; font-weight: bold; color: #0984e3; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(0,0,0,.1); border-radius: 50%; border-top-color: #0984e3; animation: spin 1s ease-in-out infinite; margin-right: 5px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1>HỆ THỐNG GIÁM SÁT NHÀ KHO</h1>
        
        <div class="control-panel">
            <label for="modeSelect"><strong>Chế độ hiển thị:</strong></label>
            <select id="modeSelect" onchange="switchMode()">
                <option value="realtime">Dữ liệu Realtime (Tức thời)</option>
                <option value="history-100">100 Dòng mới nhất (Chi tiết phút)</option>
                <option value="30p">Trung bình 30 Phút qua</option>
                <option value="1Day">Trung bình 1 Ngày qua</option>
                <option value="1Week">Trung bình 1 Tuần qua</option>
                <option value="1Month">Trung bình 1 Tháng qua</option>
            </select>
        </div>

        <div class="chart-container">
            <canvas id="telemetryChart"></canvas>
        </div>

        <div class="ota-box">
            <h3>Cập Nhật Firmware Từ Xa (GitHub Cloud)</h3>
            <p>Tệp tin <b>.bin</b> sẽ được mã hóa và đồng bộ thẳng lên Repository GitHub của bạn</p>
            <input type="file" id="firmwareInput" accept=".bin">
            <br>
            <button id="uploadBtn" onclick="triggerRemoteOTA()">Đồng bộ lên GitHub & Nạp</button>
            <div id="statusText"></div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('telemetryChart').getContext('2d');
        const socket = io();
        let displayMode = 'realtime';

        const telemetryChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Nhiệt độ (°C)', data: [], borderColor: '#e17055', backgroundColor: 'rgba(225, 112, 85, 0.1)', fill: true, tension: 0.3, borderWidth: 2.5 },
                    { label: 'Độ ẩm (%)', data: [], borderColor: '#0984e3', backgroundColor: 'rgba(9, 132, 227, 0.1)', fill: true, tension: 0.3, borderWidth: 2.5 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { title: { display: true, text: 'Trục Thời Gian (Giờ:Phút:Giây)', font: { weight: 'bold' } } },
                    y: { title: { display: true, text: 'Giá Trị Đo', font: { weight: 'bold' } } }
                }
            }
        });

        socket.on('mqttData', (data) => {
            if (displayMode === 'realtime') {
                if (telemetryChart.data.labels.length >= 25) {
                    telemetryChart.data.labels.shift();
                    telemetryChart.data.datasets[0].data.shift();
                    telemetryChart.data.datasets[1].data.shift();
                }
                telemetryChart.data.labels.push(data.time);
                telemetryChart.data.datasets[0].data.push(data.temp.toFixed(1));
                telemetryChart.data.datasets[1].data.push(data.hum.toFixed(1));
                telemetryChart.update();
            }
        });

        async function switchMode() {
            displayMode = document.getElementById('modeSelect').value;
            if (displayMode === 'realtime') {
                telemetryChart.data.labels = [];
                telemetryChart.data.datasets[0].data = [];
                telemetryChart.data.datasets[1].data = [];
                telemetryChart.update();
                return;
            }

            const targetEndpoint = displayMode === 'history-100' ? '/api/history-100' : `/api/summary/${displayMode}`;
            try {
                const response = await fetch(targetEndpoint);
                const fetchedData = await response.json();

                telemetryChart.data.labels = fetchedData.map(item => item.time);
                telemetryChart.data.datasets[0].data = fetchedData.map(item => item.temp);
                telemetryChart.data.datasets[1].data = fetchedData.map(item => item.hum);
                telemetryChart.update();
            } catch (err) {
                alert('Không thể tải dữ liệu thống kê từ Server!');
            }
        }

        function triggerRemoteOTA() {
            const input = document.getElementById('firmwareInput');
            const status = document.getElementById('statusText');
            const btn = document.getElementById('uploadBtn');

            if (input.files.length === 0) {
                alert('Vui lòng chọn tệp tin .bin trước!');
                return;
            }

            const payload = new FormData();
            payload.append('firmware', input.files[0]);

            btn.disabled = true;
            status.style.color = '#0984e3';
            status.innerHTML = '<span class="spinner"></span>Đang mã hóa và đẩy lên kho lưu trữ GitHub... (Vui lòng đợi vài giây)';

            fetch('/upload-ota', {
                method: 'POST',
                body: payload
            })
            .then(async response => {
                const msg = await response.text();
                if (!response.ok) throw new Error(msg);
                return msg;
            })
            .then(successMsg => {
                status.style.color = '#00b894';
                status.innerText = successMsg;
                input.value = '';
            })
            .catch(error => {
                status.style.color = '#d63031';
                status.innerText = 'Lỗi cập nhật: ' + error.message;
            })
            .finally(() => {
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
